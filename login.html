<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.5/sweetalert2.all.min.js"></script>
    <script src="js/utileria.js"></script>
    <script src="js/login.js" defer></script>
</head>

<body>

    <div class="contenedor-principal">
        <div class="contenedor pequeno">
            <h1>Iniciar Sesion</h1>
            <p class="subtitulo">Ingresa tus credenciales para acceder al sistema.</p>

            <form id="formularioLogin" novalidate>
                <div class="grupo-campo" id="grupoCorreo">
                    <label for="correo">Correo Electronico</label>
                    <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com">
                    <span class="mensaje-error">Introduce un formato de correo valido.</span>
                </div>

                <div class="grupo-campo" id="grupoContrasena">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña">
                    <span class="mensaje-error">Minimo 8 caracteres, combinando letras y numeros.</span>
                </div>

                <button type="submit" class="boton-primario">Ingresar</button>
            </form>

            <p class="texto-pie">¿No tienes cuenta? <a href="registro.html">Registrate aqui</a></p>
        </div>
    </div>

</body>

</html>
